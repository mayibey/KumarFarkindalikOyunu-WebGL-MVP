<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | KumarFarkindalikOyunu</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- WEBGL_FULLSCREEN_PATCH -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        min-height: -webkit-fill-available;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background: #000;
        box-sizing: border-box;
      }
      *, *::before, *::after { box-sizing: inherit; }

      #unity-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 75; /* anlatici DOM iframe (z:100) üstte; ArkayaAt (z:50) altta — modal pixels içeride görünür */
      }
      #unity-canvas {
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        max-height: none !important;
        aspect-ratio: unset !important;
        background: #000;
        display: block;
      }

      .unity-desktop, .unity-mobile {
        width: 100vw !important;
        height: 100vh !important;
      }

      #unity-container.unity-desktop,
      #unity-container.unity-mobile {
        position: fixed !important;
        left: 0 !important;
        top: 0 !important;
        max-width: none !important;
        max-height: none !important;
        transform: none !important;
        margin: 0 !important;
        display: flex !important;
        flex-direction: column !important;
      }
      #unity-container.unity-desktop #unity-canvas,
      #unity-container.unity-mobile #unity-canvas {
        flex: 1 1 0;
        align-self: stretch;
        min-height: 0;
      }

      #unity-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 100;
      }
    </style>
  <script src="TemplateData/profiler.js"></script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">KumarFarkindalikOyunu</div>
      </div>
    </div>
    <script>
      console.log('[index.html] SCRIPT YUKLENDI: ' + new Date().toISOString());
      // === PANEL KÖPRÜsü: Unity yüklenmeden önce listener'ı kur ===
      var _panelUnityInst = null;
      window.addEventListener('message', function(e) {
        console.log('[index.html] RAW message:', typeof e.data, JSON.stringify(e.data).substring(0, 150));
        var d = e.data;
        if (!d || d.source !== 'yoneticiPanel') return;
        if (!_panelUnityInst) { console.warn('[index.html] Unity henüz hazır değil'); return; }
        var json = JSON.stringify({ source: d.source, key: d.key, value: String(d.value) });
        console.log('[index.html] Unity SendMessage:', json);
        _panelUnityInst.SendMessage('PanelKopru', 'AyarAl', json);
      }, false);
      // === Panel Köprüsü Sonu ===

      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL_MVP.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL_MVP.data",
        frameworkUrl: buildUrl + "/WebGL_MVP.framework.js",
        codeUrl: buildUrl + "/WebGL_MVP.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "KumarFarkindalikOyunu",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";


      } else {
        canvas.style.width = "1920px";
        canvas.style.height = "1080px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                // Panel köprüsü: global değişkene ata (listener sayfanın başında kayıtlı)
                _panelUnityInst = unityInstance;
                window.unityInstance = unityInstance;
                console.log('[index.html] Unity hazır, _panelUnityInst SET:', !!_panelUnityInst);

                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

                var profile = unityProfiler.createButton(unityInstance);
                profile.style.marginLeft = '5px';
                document.querySelector("#unity-build-title").appendChild(profile);

                var quit = document.createElement("button");
                quit.style = "margin-left: 5px; background-color: lightgray; border: none; padding: 5px; cursor: pointer";
                quit.innerHTML = "Unload";
                document.querySelector("#unity-build-title").appendChild(quit);
                quit.onclick = () => {
                  unityInstance.Quit().then(() => {
                    unityProfiler.shutDown();
                    document.querySelector("#unity-container").remove();
                    canvas = null;
                    script.remove();
                    script = null;
                  });
                };
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>

    <!-- WEBGL_FULLSCREEN_PATCH_FS3: Aggressive canvas resize override -->
    <script>
      (function() {
        function forceFullscreen() {
          var c = document.querySelector("#unity-canvas");
          if (c) {
            c.style.width  = window.innerWidth  + "px";
            c.style.height = window.innerHeight + "px";
          }
          var ct = document.querySelector("#unity-container");
          if (ct) {
            ct.style.width  = window.innerWidth  + "px";
            ct.style.height = window.innerHeight + "px";
          }
        }
        window.addEventListener("resize", forceFullscreen);
        window.addEventListener("orientationchange", forceFullscreen);
        window.addEventListener("load", function() {
          forceFullscreen();
          setTimeout(forceFullscreen, 100);
          setTimeout(forceFullscreen, 500);
          setTimeout(forceFullscreen, 1500);
          setTimeout(forceFullscreen, 3000);
        });
      })();
    </script>
  </body>
</html>
