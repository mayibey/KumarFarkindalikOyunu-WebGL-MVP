<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | KumarFarkindalikOyunu</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- WEBGL_FULLSCREEN_PATCH -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        box-sizing: border-box;
      }
      *, *::before, *::after { box-sizing: inherit; }

      #unity-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        background: #000;
        display: block;
      }

      .unity-desktop, .unity-mobile {
        width: 100vw !important;
        height: 100vh !important;
      }

      #unity-container.unity-desktop,
      #unity-container.unity-mobile {
        position: fixed !important;
        left: 0 !important;
        top: 0 !important;
        max-width: none !important;
        max-height: none !important;
        transform: none !important;
        margin: 0 !important;
        display: flex !important;
        flex-direction: column !important;
      }
      #unity-container.unity-desktop #unity-canvas,
      #unity-container.unity-mobile #unity-canvas {
        flex: 1 1 0;
        align-self: stretch;
        min-height: 0;
      }

      #unity-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 100;
      }
    </style>

  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">KumarFarkindalikOyunu</div>
      </div>
    </div>
    <script>
      console.log('[index.html] SCRIPT YUKLENDI: ' + new Date().toISOString());
      // === PANEL KÖPRÜsü: Unity yüklenmeden önce listener'ı kur ===
      var _panelUnityInst = null;
      window.addEventListener('message', function(e) {
        console.log('[index.html] RAW message:', typeof e.data, JSON.stringify(e.data).substring(0, 150));
        var d = e.data;
        if (!d || d.source !== 'yoneticiPanel') return;
        if (!_panelUnityInst) { console.warn('[index.html] Unity henüz hazır değil'); return; }
        var json = JSON.stringify({ source: d.source, key: d.key, value: String(d.value) });
        console.log('[index.html] Unity SendMessage:', json);
        _panelUnityInst.SendMessage('PanelKopru', 'AyarAl', json);
      }, false);
      // === Panel Köprüsü Sonu ===

      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL_MVP.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL_MVP.data.unityweb",
        frameworkUrl: buildUrl + "/WebGL_MVP.framework.js.unityweb",
        codeUrl: buildUrl + "/WebGL_MVP.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "KumarFarkindalikOyunu",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";


      } else {
        
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                // Panel köprüsü: global değişkene ata (listener sayfanın başında kayıtlı)
                _panelUnityInst = unityInstance;
                window.unityInstance = unityInstance;
                console.log('[index.html] Unity hazır, _panelUnityInst SET:', !!_panelUnityInst);

                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
