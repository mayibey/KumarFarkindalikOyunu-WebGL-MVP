<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | KumarFarkindalikOyunu</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  <script src="TemplateData/profiler.js"></script>
  <style>
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }
    #auth-card {
      width: min(92vw, 420px);
      background: rgba(22, 24, 34, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      padding: 24px;
      color: #f3f4f6;
      font-family: Arial, sans-serif;
    }
    #auth-title {
      margin: 0 0 10px 0;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }
    #auth-subtitle {
      margin: 0 0 16px 0;
      font-size: 14px;
      opacity: 0.85;
      text-align: center;
    }
    #auth-password {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border-radius: 10px;
      padding: 11px 12px;
      outline: none;
      font-size: 15px;
    }
    #auth-submit {
      margin-top: 12px;
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    #auth-error {
      margin-top: 10px;
      min-height: 20px;
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      font-weight: 700;
    }
    /* Masaustu: tam ekran oyun alani (TemplateData/style.css merkez kutusunu override eder) */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }
    #unity-container.unity-desktop {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      transform: none !important;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    #unity-container.unity-desktop #unity-canvas {
      flex: 1 1 0;
      align-self: stretch;
      width: 100% !important;
      min-height: 0;
      display: block;
    }
    #unity-container.unity-desktop #unity-footer {
      flex: 0 0 auto;
    }
  </style>
  </head>
  <body>
    <div id="auth-overlay">
      <div id="auth-card">
        <h1 id="auth-title">Erisim Kontrolu</h1>
        <p id="auth-subtitle">Oyuna girmek icin sifreyi girin.</p>
        <input id="auth-password" type="password" placeholder="Sifre" autocomplete="off" />
        <button id="auth-submit" type="button">Girisi Ac</button>
        <div id="auth-error"></div>
      </div>
    </div>

    <div id="unity-container" class="unity-desktop" style="display:none;">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">KumarFarkindalikOyunu</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL_MVP.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL_MVP.data",
        frameworkUrl: buildUrl + "/WebGL_MVP.framework.js",
        codeUrl: buildUrl + "/WebGL_MVP.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "KumarFarkindalikOyunu",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        /* Tam ekran boyut CSS ile verilir; sabit 960x600 kullanma */
      }

      var ACCESS_PASSWORD = "kumar2026";
      var authOverlay = document.querySelector("#auth-overlay");
      var authPassword = document.querySelector("#auth-password");
      var authSubmit = document.querySelector("#auth-submit");
      var authError = document.querySelector("#auth-error");
      var unityBootStarted = false;

      function startUnityBoot() {
        if (unityBootStarted) return;
        unityBootStarted = true;
        document.querySelector("#unity-container").style.display = "block";
        document.querySelector("#unity-loading-bar").style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          function installRuntimeErrorBridge(unityInstanceRef) {
          if (window.__unityWebglErrorBridgeInstalled) return;
          window.__unityWebglErrorBridgeInstalled = true;
          window.__unityLastRuntimeError = "";
          function pushError(prefix, payload) {
            var text = prefix + ": " + payload;
            window.__unityLastRuntimeError = text;
            try {
              if (unityInstanceRef && unityInstanceRef.SendMessage) {
                unityInstanceRef.SendMessage("OyunYoneticisi", "WebGlJsHataAl", text);
              }
            } catch (e) {
              // no-op, non-blocking debug bridge
            }
          }
          window.onerror = function(message, source, lineno, colno) {
            pushError("window.onerror", String(message) + " @ " + String(source) + ":" + String(lineno) + ":" + String(colno));
          };
          window.onunhandledrejection = function(event) {
            var reason = event && event.reason ? event.reason : "unknown";
            pushError("unhandledrejection", String(reason));
          };
        }

          createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                installRuntimeErrorBridge(unityInstance);
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

                var profile = unityProfiler.createButton(unityInstance);
                profile.style.marginLeft = '5px';
                document.querySelector("#unity-build-title").appendChild(profile);

                // Unloading web content from DOM so that browser GC can run can be tricky to get right.
                // This code snippet shows how to correctly implement a Unity content Unload mechanism to a web page.

                // Unloading Unity content enables a web page to reclaim the memory used by Unity, e.g. for
                // the purpose of later loading another Unity content instance on the _same_ web page.

                // When using this functionality, take caution to carefully make sure to clear all JavaScript code,
                // DOM element and event handler references to the old content you may have retained, or
                // otherwise the browser's garbage collector will be unable to reclaim the old page.

                // N.b. Unity content does _not_ need to be manually unloaded when the user is navigating away from
                // the current page to another web page. The browser will take care to clear memory of old visited
                // pages automatically. This functionality is only needed if you want to switch between loading
                // multiple Unity builds on a single web page.
                var quit = document.createElement("button");
                quit.style = "margin-left: 5px; background-color: lightgray; border: none; padding: 5px; cursor: pointer";
                quit.innerHTML = "Unload";
                document.querySelector("#unity-build-title").appendChild(quit);
                quit.onclick = () => {
                  // Quit Unity application execution
                  unityInstance.Quit().then(() => {
                    unityProfiler.shutDown();
                    // Remove DOM elements from the page so GC can run
                    document.querySelector("#unity-container").remove();
                    canvas = null;
                    // Remover script elements from the page so GC can run
                    script.remove();
                    script = null;
                  });
                };
              }).catch((message) => {
                alert(message);
              });
          };

        document.body.appendChild(script);
      }

      function tryAuth() {
        var val = (authPassword.value || "").trim();
        if (val === ACCESS_PASSWORD) {
          authError.textContent = "";
          authOverlay.style.display = "none";
          startUnityBoot();
          return;
        }
        authError.textContent = "Hatali sifre. Lutfen tekrar deneyin.";
      }

      authSubmit.addEventListener("click", tryAuth);
      authPassword.addEventListener("keydown", function(e) {
        if (e.key === "Enter") tryAuth();
      });

    </script>
  </body>
</html>
